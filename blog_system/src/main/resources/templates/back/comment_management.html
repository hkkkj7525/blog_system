<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>评论管理 - 博客管理系统</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .comment-card {
            border-left: 4px solid #ffc107;
            margin-bottom: 1rem;
        }
        .comment-approved {
            border-left-color: #28a745;
        }
        .comment-rejected {
            border-left-color: #dc3545;
        }
        .status-badge {
            font-size: 0.75em;
        }
    </style>
</head>
<body>
<div th:replace="~{back/common :: header}"></div>

<div class="container-fluid">
    <div class="row">
        <div th:replace="~{back/common :: sidebar}"></div>

        <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4">
            <div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
                <h1 class="h2">评论管理</h1>
                <div class="btn-toolbar mb-2 mb-md-0">
                    <div class="btn-group me-2">
                        <button type="button" class="btn btn-sm btn-outline-secondary" onclick="location.reload()">
                            刷新
                        </button>
                    </div>
                </div>
            </div>

            <!-- 评论统计 -->
            <div class="row mb-4">
                <div class="col-md-3">
                    <div class="card text-white bg-primary">
                        <div class="card-body">
                            <h5 class="card-title">待审核</h5>
                            <p class="card-text display-6" th:text="${#lists.size(pendingComments)}">0</p>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 待审核评论列表 -->
            <div class="card">
                <div class="card-header">
                    <h5 class="card-title mb-0">
                        待审核评论
                        <span class="badge bg-warning" th:text="${#lists.size(pendingComments)}">0</span>
                    </h5>
                </div>
                <div class="card-body">
                    <div th:if="${#lists.isEmpty(pendingComments)}" class="text-center py-4">
                        <p class="text-muted">暂无待审核的评论</p>
                    </div>

                    <div th:each="comment : ${pendingComments}" class="comment-card card mb-3">
                        <div class="card-body">
                            <div class="d-flex justify-content-between align-items-start">
                                <div class="flex-grow-1">
                                    <div class="d-flex align-items-center mb-2">
                                        <h6 class="card-title mb-0 me-2" th:text="${comment.author}">作者</h6>
                                        <span class="badge bg-warning status-badge">待审核</span>
                                    </div>
                                    <p class="card-text" th:text="${comment.content}">评论内容</p>
                                    <div class="text-muted small">
                                        <span>发表于 <span th:text="${#dates.format(comment.created, 'yyyy-MM-dd HH:mm')}"></span></span>
                                        <span class="ms-2">文章: <span th:text="${comment.article.title}">文章标题</span></span>
                                    </div>
                                </div>
                                <div class="btn-group ms-3">
                                    <button type="button" class="btn btn-sm btn-success"
                                            th:onclick="|approveComment(${comment.id})|">
                                        通过
                                    </button>
                                    <button type="button" class="btn btn-sm btn-danger"
                                            th:onclick="|rejectComment(${comment.id})|">
                                        拒绝
                                    </button>
                                    <button type="button" class="btn btn-sm btn-outline-danger"
                                            th:onclick="|deleteComment(${comment.id})|">
                                        删除
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 所有评论列表（如果需要显示所有评论，可以在这里扩展） -->
            <div class="card mt-4">
                <div class="card-header">
                    <h5 class="card-title mb-0">所有评论</h5>
                </div>
                <div class="card-body">
                    <p class="text-muted">这里可以显示所有评论的完整列表，包括已审核和未审核的评论。</p>
                    <p class="text-muted">需要后端提供相应的数据接口来获取所有评论。</p>
                </div>
            </div>
        </main>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    function approveComment(commentId) {
        if (confirm('确定要通过这条评论吗？')) {
            fetch('/admin/comments/approve?commentId=' + commentId, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/x-www-form-urlencoded',
                }
            })
                .then(response => response.json())
                .then(data => {
                    if (data.success) {
                        alert('评论已通过');
                        location.reload();
                    } else {
                        alert('操作失败: ' + data.message);
                    }
                })
                .catch(error => {
                    console.error('Error:', error);
                    alert('操作失败');
                });
        }
    }

    function rejectComment(commentId) {
        if (confirm('确定要拒绝这条评论吗？')) {
            fetch('/admin/comments/reject?commentId=' + commentId, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/x-www-form-urlencoded',
                }
            })
                .then(response => response.json())
                .then(data => {
                    if (data.success) {
                        alert('评论已拒绝');
                        location.reload();
                    } else {
                        alert('操作失败: ' + data.message);
                    }
                })
                .catch(error => {
                    console.error('Error:', error);
                    alert('操作失败');
                });
        }
    }

    function deleteComment(commentId) {
        if (confirm('确定要删除这条评论吗？此操作不可恢复！')) {
            fetch('/admin/comments/delete?commentId=' + commentId, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/x-www-form-urlencoded',
                }
            })
                .then(response => response.json())
                .then(data => {
                    if (data.success) {
                        alert('评论已删除');
                        location.reload();
                    } else {
                        alert('删除失败: ' + data.message);
                    }
                })
                .catch(error => {
                    console.error('Error:', error);
                    alert('删除失败');
                });
        }
    }
</script>
</body>
</html>
